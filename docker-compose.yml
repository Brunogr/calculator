services:
  backend:
    build:
      context: ./backend
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    environment:
      PORT: "3000"
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173}
      SWAGGER_ENABLED: ${SWAGGER_ENABLED:-true}
      APP_ENV: ${APP_ENV:-development}
